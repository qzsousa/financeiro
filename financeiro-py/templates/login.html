<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finanças — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <h1 class="login-title">Finanças</h1>
    <p class="login-sub">Entre para acessar seu painel.</p>

    <form method="post" action="/login">
      <div class="login-field">
        <label>Email</label>
        <input type="email" name="email" placeholder="voce@email.com" required autofocus/>
      </div>
      <div class="login-field">
        <label>Senha</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      {% if erro %}
        <p class="login-error">{{ erro }}</p>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:9px;">
        Entrar
      </button>
    </form>
  </div>
</div>
</body>
</html>
